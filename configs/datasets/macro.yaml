dataset:
  name: macro
  kind: exogenous_time_series
  split:
    train: 0.70
    val: 0.15
    test: 0.15

  features:
    - inflation
    - interest_rate
    - yield_curve_slope
    - unemployment
    - vix
    - credit_spread
    - dollar_index
    - commodity_index
    - risk_sentiment

  preprocessing:
    normalize_globally: true
    zscore_window: 252
    clip_quantile: 0.995
    fill_missing: interpolate_then_zero

  sampling:
    context_length: 64
    target_length: 8
    horizon_set: [1, 2, 4, 8]
    stride: 1
    overlap: true