training:
  seed: 42
  device: cuda
  batch_size: 64
  epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 0.001
  grad_clip_norm: 1.0
  freeze_backbone: true
  finetune_encoder_layers: 2
  task: volatility_forecasting
  log_every: 25
  eval_every: 200
  save_every: 500
  mixed_precision: true
  num_workers: 4

head:
  hidden_dim: 128
  layers: 2
  dropout: 0.1

loss_weights:
  task: 1.0
  aux_latent: 0.1