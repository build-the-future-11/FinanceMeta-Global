training:
  seed: 42
  device: cuda
  batch_size: 64
  epochs: 200
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip_norm: 1.0
  ema_tau: 0.996
  context_length: 128
  target_length: 16
  horizons: [1, 2, 4, 8, 16]
  log_every: 50
  eval_every: 500
  save_every: 1000
  mixed_precision: true
  num_workers: 4

loss_weights:
  latent_prediction: 1.0
  nll: 1.0
  noarb: 0.10
  volatility: 0.10
  liquidity: 0.05
  macro: 0.05
  representation: 0.01